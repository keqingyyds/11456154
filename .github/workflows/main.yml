name: Build Weapon Avatar Fix

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential file
        
      - name: Find and Build
        run: |
          mkdir -p build
          
          # 查找所有 .c 文件
          echo "Searching for .c files..."
          find . -name "*.c" -not -path "./.github/*"
          
          # 使用第一个找到的 .c 文件
          SOURCE=$(find . -name "*.c" -not -path "./.github/*" | head -1)
          
          if [ -z "$SOURCE" ]; then
            echo "No C source file found!"
            exit 1
          fi
          
          echo "Building: $SOURCE"
          gcc -shared -O2 -Wall -fPIC -o build/libweapon_avatar_fix.so "$SOURCE" -ldl
          
          echo "Build complete:"
          file build/libweapon_avatar_fix.so
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: libweapon_avatar_fix
          path: build/*.so
